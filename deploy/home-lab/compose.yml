services:
  garbage-vision:
    build:
      context: /home/art/garbage-vision
      args:
        INSTALL_YOLO: "true"
    container_name: garbage-vision
    env_file:
      - path: /home/art/garbage-vision/.env
        required: false
    volumes:
      - /home/art/garbage-vision/data:/app/data
      - /home/art/garbage-vision/models:/app/models:ro
      - /home/art/garbage-vision/samples:/app/samples:ro
    restart: unless-stopped
    command: ["prod"]

  garbage-vision-images:
    image: nginx:1.27-alpine
    container_name: garbage-vision-images
    volumes:
      - /home/art/garbage-vision/data/detections:/usr/share/nginx/html:ro
    ports:
      - "127.0.0.1:8765:80"
    restart: unless-stopped
