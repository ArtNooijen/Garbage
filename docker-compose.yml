services:
  garbage-vision:
    build:
      context: .
      args:
        INSTALL_YOLO: "true"
    container_name: garbage-vision
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data
      - ./models:/app/models:ro
      - ./samples:/app/samples:ro
    restart: unless-stopped
    command: ["prod"]

  garbage-vision-test:
    build:
      context: .
      args:
        INSTALL_YOLO: "true"
    profiles:
      - test
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data
      - ./models:/app/models:ro
      - ./samples:/app/samples:ro
    restart: "no"
    command: ["test", "--source", "images"]
