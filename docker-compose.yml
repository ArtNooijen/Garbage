services:
  garbage-vision:
    build:
      context: .
      args:
        INSTALL_YOLO: "true"
    container_name: garbage-vision
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data
      - ./models:/app/models:ro
      - ./samples:/app/samples:ro
    restart: unless-stopped
    command: ["prod"]

  garbage-vision-images:
    image: nginx:1.27-alpine
    container_name: garbage-vision-images
    volumes:
      - ./data/detections:/usr/share/nginx/html:ro
    ports:
      - "127.0.0.1:8765:80"
    restart: unless-stopped

  garbage-vision-test:
    build:
      context: .
      args:
        INSTALL_YOLO: "true"
    profiles:
      - test
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data
      - ./models:/app/models:ro
      - ./samples:/app/samples:ro
    restart: "no"
    command: ["test", "--source", "images"]
